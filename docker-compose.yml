services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    expose:
      - "8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs
      - ./backend/checkpoints:/app/checkpoints
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    expose:
      - "80"
    depends_on:
      - backend
